<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookfinder General</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        header { text-align: center; padding: 30px 0 10px; }
        header h1 { font-size: 2.2em; color: #00d4ff; margin-bottom: 6px; }
        header p { color: #888; font-size: 1em; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            margin: 20px 0 0;
            border-bottom: 2px solid #2a2a4a;
        }
        .tab {
            padding: 12px 24px;
            font-size: 15px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab:hover { color: #ccc; }
        .tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Search */
        .search-box {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #2a2a4a;
        }
        .search-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .search-row input[type="text"] {
            flex: 1; padding: 12px 16px; font-size: 15px;
            border: 2px solid #2a2a4a; border-radius: 8px;
            background: #0f0f23; color: #e0e0e0; outline: none;
        }
        .search-row input:focus { border-color: #00d4ff; }
        .search-row button, .btn-primary {
            padding: 12px 24px; font-size: 15px;
            background: #00d4ff; color: #1a1a2e;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold;
            white-space: nowrap;
        }
        .search-row button:hover, .btn-primary:hover { background: #00b8d9; }
        .search-row button:disabled, .btn-primary:disabled {
            background: #444; color: #888; cursor: not-allowed;
        }

        .filters { display: flex; gap: 10px; flex-wrap: wrap; }
        .filters select {
            padding: 8px 10px; font-size: 13px;
            border: 1px solid #2a2a4a; border-radius: 6px;
            background: #0f0f23; color: #e0e0e0;
        }
        .filters label { color: #888; font-size: 12px; display: flex; flex-direction: column; gap: 3px; }

        /* Status */
        .status { text-align: center; padding: 20px; color: #888; font-size: 14px; }
        .status.error { color: #ff6b6b; }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 3px solid #2a2a4a; border-top-color: #00d4ff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result cards */
        .results-count { color: #00d4ff; font-size: 13px; margin-bottom: 10px; }
        .result-card {
            background: #16213e; border: 1px solid #2a2a4a;
            border-radius: 10px; padding: 16px; margin-bottom: 10px;
        }
        .result-card:hover { border-color: #00d4ff; }
        .result-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .result-author { color: #aaa; margin-bottom: 6px; font-size: 14px; }
        .result-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .result-meta span {
            font-size: 12px; color: #888; background: #0f0f23;
            padding: 3px 8px; border-radius: 4px;
        }
        .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn-download {
            padding: 7px 14px; font-size: 13px;
            background: #28a745; color: white;
            border: none; border-radius: 6px; cursor: pointer;
        }
        .btn-download:hover { background: #218838; }
        .btn-download:disabled { background: #444; color: #888; cursor: not-allowed; }

        .btn-outline {
            padding: 7px 14px; font-size: 13px;
            background: transparent; color: #00d4ff;
            border: 1px solid #00d4ff; border-radius: 6px; cursor: pointer;
        }
        .btn-outline:hover { background: #16213e; }

        /* Download links panel */
        .download-links {
            display: none; margin-top: 10px; padding: 10px;
            background: #0f0f23; border-radius: 6px;
        }
        .download-links.show { display: block; }
        .download-links a {
            display: block; color: #00d4ff; text-decoration: none;
            padding: 4px 0; font-size: 13px;
        }
        .download-links a:hover { text-decoration: underline; }
        .dl-source { color: #888; font-size: 11px; margin-right: 6px; }

        .card-status { margin-top: 6px; font-size: 13px; color: #888; }
        .card-status.success { color: #28a745; }
        .card-status.error { color: #ff6b6b; }

        /* Library */
        .library-empty {
            text-align: center; padding: 40px; color: #666;
        }
        .library-search {
            margin: 20px 0; display: flex; gap: 10px;
        }
        .library-search input {
            flex: 1; padding: 10px 14px; font-size: 14px;
            border: 2px solid #2a2a4a; border-radius: 8px;
            background: #0f0f23; color: #e0e0e0; outline: none;
        }
        .library-search input:focus { border-color: #00d4ff; }
        .book-badge {
            display: inline-block; font-size: 11px; padding: 2px 6px;
            border-radius: 3px; margin-left: 6px;
        }
        .badge-content { background: #1a5276; color: #85c1e9; }
        .badge-translated { background: #1a4731; color: #82e0aa; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bookfinder General</h1>
            <p>Search & Download Research Books</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('search')">Search</button>
            <button class="tab" onclick="switchTab('library')">Library</button>
        </div>

        <!-- Search Tab -->
        <div id="tab-search" class="tab-content active">
            <div class="search-box">
                <div class="search-row">
                    <input type="text" id="query" placeholder="Search for books... (titles in any language, authors, topics)" autofocus>
                    <button id="searchBtn" onclick="doSearch()">Search</button>
                </div>
                <div class="filters">
                    <label>Language
                        <select id="lang">
                            <option value="">All</option>
                            <option value="en">English</option>
                            <option value="de">German</option>
                            <option value="fr">French</option>
                            <option value="es">Spanish</option>
                            <option value="it">Italian</option>
                            <option value="ru">Russian</option>
                            <option value="pt">Portuguese</option>
                            <option value="nl">Dutch</option>
                            <option value="pl">Polish</option>
                            <option value="la">Latin</option>
                        </select>
                    </label>
                    <label>Format
                        <select id="ext">
                            <option value="">All</option>
                            <option value="pdf">PDF</option>
                            <option value="epub">EPUB</option>
                            <option value="mobi">MOBI</option>
                            <option value="djvu">DJVU</option>
                        </select>
                    </label>
                    <label>Type
                        <select id="content">
                            <option value="">All</option>
                            <option value="book_nonfiction">Non-fiction</option>
                            <option value="book_fiction">Fiction</option>
                            <option value="magazine">Magazines</option>
                        </select>
                    </label>
                </div>
            </div>

            <div id="status" class="status" style="display:none;"></div>
            <div id="results"></div>
        </div>

        <!-- Library Tab -->
        <div id="tab-library" class="tab-content">
            <div class="library-search">
                <input type="text" id="libQuery" placeholder="Filter library..." oninput="loadLibrary(this.value)">
            </div>
            <div id="library-results"></div>
        </div>
    </div>

    <script>
        const queryEl = document.getElementById('query');
        queryEl.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'library') loadLibrary();
        }

        async function doSearch() {
            const q = queryEl.value.trim();
            if (!q) return;

            const lang = document.getElementById('lang').value;
            const ext = document.getElementById('ext').value;
            const content = document.getElementById('content').value;
            const btn = document.getElementById('searchBtn');
            const status = document.getElementById('status');
            const results = document.getElementById('results');

            btn.disabled = true; btn.textContent = 'Searching...';
            status.style.display = 'block'; status.className = 'status';
            status.innerHTML = '<span class="spinner"></span> Searching... (a browser window may open briefly)';
            results.innerHTML = '';

            try {
                const params = new URLSearchParams({ q, lang, ext, content });
                const resp = await fetch('/api/search?' + params);
                const data = await resp.json();

                if (data.error) {
                    status.className = 'status error';
                    status.textContent = 'Error: ' + data.error;
                    return;
                }
                if (data.results.length === 0) {
                    status.textContent = 'No results found. Try different search terms.';
                    return;
                }

                status.style.display = 'none';
                results.innerHTML = `<div class="results-count">Found ${data.results.length} results</div>`;
                data.results.forEach(r => results.appendChild(createResultCard(r)));
            } catch (err) {
                status.className = 'status error';
                status.textContent = 'Connection error: ' + err.message;
            } finally {
                btn.disabled = false; btn.textContent = 'Search';
            }
        }

        function createResultCard(r) {
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="result-title">${esc(r.title)}</div>
                ${r.author ? `<div class="result-author">by ${esc(r.author)}</div>` : ''}
                <div class="result-meta">
                    ${r.year ? `<span>${esc(r.year)}</span>` : ''}
                    ${r.extension ? `<span>${esc(r.extension.toUpperCase())}</span>` : ''}
                    ${r.filesize ? `<span>${esc(r.filesize)}</span>` : ''}
                    ${r.language ? `<span>${esc(r.language)}</span>` : ''}
                </div>
                <div class="result-actions">
                    <button class="btn-download" onclick="downloadToLibrary(this, ${esc(JSON.stringify(JSON.stringify(r)))})">
                        Download to Library
                    </button>
                    <button class="btn-outline" onclick="toggleLinks('${r.md5}', this)">
                        Manual Download Links
                    </button>
                </div>
                <div class="download-links" id="links-${r.md5}"></div>
                <div class="card-status" id="status-${r.md5}"></div>
            `;
            return card;
        }

        async function downloadToLibrary(btn, bookJson) {
            const book = JSON.parse(bookJson);
            const statusEl = document.getElementById('status-' + book.md5);

            btn.disabled = true; btn.textContent = 'Downloading...';
            statusEl.textContent = 'Downloading and processing (this may take a minute)...';
            statusEl.className = 'card-status';

            try {
                const resp = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(book),
                });
                const data = await resp.json();

                if (data.error) {
                    statusEl.textContent = 'Error: ' + data.error;
                    statusEl.className = 'card-status error';
                    btn.disabled = false; btn.textContent = 'Retry Download';
                    return;
                }

                let msg = data.status === 'already_downloaded' ? 'Already in library!' : 'Downloaded & processed!';
                if (data.has_content) msg += ' Text extracted.';
                if (data.has_translation) msg += ' Translated to English.';

                statusEl.textContent = msg;
                statusEl.className = 'card-status success';
                btn.textContent = 'In Library';
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'card-status error';
                btn.disabled = false; btn.textContent = 'Retry Download';
            }
        }

        async function toggleLinks(md5, btn) {
            const container = document.getElementById('links-' + md5);
            if (container.classList.contains('show')) {
                container.classList.remove('show');
                return;
            }

            btn.textContent = 'Loading...'; btn.disabled = true;

            try {
                const resp = await fetch('/api/links?md5=' + md5);
                const data = await resp.json();

                if (data.links && data.links.length > 0) {
                    container.innerHTML = data.links.map(l =>
                        `<a href="${esc(l.url)}" target="_blank" rel="noopener">
                            <span class="dl-source">[${esc(l.source)}]</span>
                            ${esc(l.url.length > 80 ? l.url.substring(0, 80) + '...' : l.url)}
                        </a>`
                    ).join('');
                    container.classList.add('show');
                } else {
                    container.innerHTML = '<span style="color:#888">No download links found.</span>';
                    container.classList.add('show');
                }
            } catch (err) {
                container.innerHTML = '<span style="color:#ff6b6b">Error loading links.</span>';
                container.classList.add('show');
            } finally {
                btn.textContent = 'Manual Download Links'; btn.disabled = false;
            }
        }

        async function loadLibrary(query = '') {
            const container = document.getElementById('library-results');
            const params = query ? '?q=' + encodeURIComponent(query) : '';

            try {
                const resp = await fetch('/api/library' + params);
                const data = await resp.json();

                if (!data.books || data.books.length === 0) {
                    container.innerHTML = `<div class="library-empty">
                        ${query ? 'No matching books.' : 'Your library is empty. Search and download some books!'}
                    </div>`;
                    return;
                }

                container.innerHTML = `<div class="results-count">${data.books.length} book(s) in library</div>`;
                data.books.forEach(b => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <div class="result-title">
                            ${esc(b.title)}
                            ${b.has_content ? '<span class="book-badge badge-content">Text Extracted</span>' : ''}
                            ${b.has_translation ? '<span class="book-badge badge-translated">Translated</span>' : ''}
                        </div>
                        ${b.author ? `<div class="result-author">by ${esc(b.author)}</div>` : ''}
                        <div class="result-meta">
                            ${b.year ? `<span>${esc(b.year)}</span>` : ''}
                            ${b.format ? `<span>${esc(b.format.toUpperCase())}</span>` : ''}
                            ${b.language ? `<span>${esc(b.language)}</span>` : ''}
                        </div>
                        <div style="font-size:12px;color:#666;margin-top:4px">ID: ${esc(b.id)}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<div class="library-empty" style="color:#ff6b6b">Error loading library.</div>`;
            }
        }

        function esc(s) {
            if (typeof s !== 'string') return s;
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    </script>
</body>
</html>
